name: find_site_icon CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.3"
            otp: "27.1"
            quality: false
          - elixir: "1.18.4"
            otp: "27.3"
            quality: false
          - elixir: "1.19.5"
            otp: "28.5"
            quality: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock', 'mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache compiled build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-mix-build-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock', 'mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-build-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile app
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Run tests
        run: MIX_ENV=test mix test

      - name: Check formatting
        if: matrix.quality
        run: mix format --check-formatted

      - name: Run Credo
        if: matrix.quality
        run: mix credo --strict

      - name: Run Dialyzer
        if: matrix.quality
        run: mix dialyzer
